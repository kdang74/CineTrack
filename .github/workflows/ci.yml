name: CineTrack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # Backend: Build + Test
  # ──────────────────────────────────────
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          Google__ClientId: test-client-id
          Google__ClientSecret: test-client-secret
          Tmdb__ApiKey: test-api-key

  # ──────────────────────────────────────
  # Frontend: Build + Test
  # ──────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://cinetrack-1544.onrender.com

      - name: Unit Tests (Vitest)
        run: npm test
        timeout-minutes: 3

  # ──────────────────────────────────────
  # E2E Tests (Playwright, main only)
  # ──────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    needs: [frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend for E2E
        run: npm run build
        env:
          VITE_API_URL: https://cinetrack-1544.onrender.com

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          VITE_API_URL: https://cinetrack-1544.onrender.com

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────
  # Deploy Frontend to Vercel (main only)
  # Vercel also auto-deploys via its GitHub integration.
  # continue-on-error prevents missing secrets from failing the workflow.
  # ──────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [backend, frontend, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI (latest)
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel --prod --yes
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────
  # Deploy Backend to Render (main only)
  # Render also auto-deploys via its GitHub integration.
  # continue-on-error prevents missing secrets from failing the workflow.
  # ──────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    needs: [backend, frontend, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -H "Content-Type: application/json"
          else
            echo "RENDER_DEPLOY_HOOK_URL not configured — skipping (Render deploys via GitHub integration)"
          fi
